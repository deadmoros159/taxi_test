# Development конфигурация для dev.xhap.ru

# Upstream для dev сервисов (используем другие порты)
upstream auth_service_dev {
    server localhost:9000;
}

upstream driver_service_dev {
    server localhost:9001;
}

upstream order_service_dev {
    server localhost:9002;
}

upstream admin_service_dev {
    server localhost:9003;
}

# Редирект HTTP -> HTTPS
server {
    listen 80;
    server_name dev.xhap.ru;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS сервер для dev
server {
    listen 443 ssl http2;
    server_name dev.xhap.ru;

    # SSL сертификаты (можно использовать те же или отдельные)
    ssl_certificate /opt/taxi/ssl/xhap.ru.fullchain.crt;
    ssl_certificate_key /opt/taxi/ssl/xhap.ru.key;

    # Безопасность заголовков
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Логирование
    access_log /var/log/nginx/dev.xhap.ru.access.log;
    error_log /var/log/nginx/dev.xhap.ru.error.log;

    # Auth Service (dev)
    location /auth {
        rewrite ^/auth(.*)$ $1 break;
        proxy_pass http://auth_service_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /auth;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Driver Service (dev)
    location /driver {
        rewrite ^/driver(.*)$ $1 break;
        proxy_pass http://driver_service_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /driver;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Order Service (dev)
    location /order {
        rewrite ^/order(.*)$ $1 break;
        proxy_pass http://order_service_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /order;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Admin Service (dev)
    location /admin {
        rewrite ^/admin(.*)$ $1 break;
        proxy_pass http://admin_service_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /admin;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

