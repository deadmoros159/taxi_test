services:
  # ==================== AUTH SERVICE ====================
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: taxi-auth-service
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - RUN_MIGRATIONS=true
      - ROOT_PATH=
      - POSTGRES_SERVER=postgres-auth
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=auth_db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres-auth:5432/auth_db
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
    env_file:
      - ./auth-service/.env
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - taxi-network

  # ==================== DRIVER SERVICE ====================
  driver-service:
    build:
      context: .
      dockerfile: ./driver-service/Dockerfile
    container_name: taxi-driver-service
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - ROOT_PATH=
      - POSTGRES_SERVER=postgres-driver
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=driver_db
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres-driver:5432/driver_db
      - AUTH_SERVICE_URL=http://auth-service:8000
    depends_on:
      postgres-driver:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - taxi-network

  # ==================== ORDER SERVICE ====================
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: taxi-order-service
    ports:
      - "8002:8002"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - ROOT_PATH=
      - POSTGRES_SERVER=postgres-order
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=order_db
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres-order:5432/order_db
      - AUTH_SERVICE_URL=http://auth-service:8000
      - DRIVER_SERVICE_URL=http://driver-service:8001
    depends_on:
      postgres-order:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      driver-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - taxi-network

  # ==================== ADMIN SERVICE ====================
  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: taxi-admin-service
    ports:
      - "8003:8003"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - ROOT_PATH=
      - AUTH_SERVICE_URL=http://auth-service:8000
      - DRIVER_SERVICE_URL=http://driver-service:8001
      - ORDER_SERVICE_URL=http://order-service:8002
    depends_on:
      auth-service:
        condition: service_healthy
      driver-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - taxi-network

  # ==================== TELEGRAM BOT SERVICE ====================
  telegram-bot-service:
    build:
      context: ./telegram-bot-service
      dockerfile: Dockerfile
    container_name: taxi-telegram-bot-service
    ports:
      - "8004:8004"  # Порт для будущего HTTP API (если понадобится)
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-8577887798:AAEMGcMot27E9iY7dEunLRxbkG5maA77s6Y}
      - AUTH_SERVICE_URL=http://auth-service:8000
      - WEBHOOK_HOST=${WEBHOOK_HOST:-http://localhost:8004}
      - WEBHOOK_PATH=/webhook
      - HOST=0.0.0.0
      - PORT=8004
      - LOG_LEVEL=INFO
    depends_on:
      auth-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - taxi-network

  # ==================== API GATEWAY ====================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: taxi-api-gateway
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8000
      - DRIVER_SERVICE_URL=http://driver-service:8001
      - ORDER_SERVICE_URL=http://order-service:8002
      - ADMIN_SERVICE_URL=http://admin-service:8003
    depends_on:
      - auth-service
      - driver-service
      - order-service
      - admin-service
    restart: unless-stopped
    networks:
      - taxi-network

  # ==================== DATABASES ====================
  postgres-auth:
    image: postgres:15-alpine
    container_name: taxi-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ./auth-service/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - taxi-network

  postgres-driver:
    image: postgres:15-alpine
    container_name: taxi-postgres-driver
    environment:
      POSTGRES_DB: driver_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_driver_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - taxi-network

  postgres-order:
    image: postgres:15-alpine
    container_name: taxi-postgres-order
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - taxi-network

  # ==================== REDIS ====================
  redis:
    image: redis:7-alpine
    container_name: taxi-redis
    command: >
      sh -c "redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes"
    env_file:
      - ./auth-service/.env
    volumes:
      - redis_data:/data
    healthcheck:
      test: >
        sh -c "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping"
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - taxi-network

  # ==================== MIGRATIONS ====================
  auth-migrations:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: taxi-auth-migrations
    command: sh -c "sleep 10 && alembic upgrade head || echo 'No migrations to apply'"
    environment:
      - POSTGRES_SERVER=postgres-auth
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=auth_db
      - POSTGRES_PORT=5432
    env_file:
      - ./auth-service/.env
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - taxi-network
    profiles:
      - migrations

volumes:
  postgres_auth_data:
  postgres_driver_data:
  postgres_order_data:
  redis_data:

networks:
  taxi-network:
    driver: bridge

